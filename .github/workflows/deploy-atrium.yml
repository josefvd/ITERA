name: Deploy to Atrium VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: atrium-vps-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    env:
      APP_DIR: /home/atrium/ITERA
      APP_NAME: itera-web
      APP_PORT: "3000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify production build
        run: npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/atrium_deploy_key
          chmod 600 ~/.ssh/atrium_deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync source to VPS
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.next' \
            --exclude 'node_modules' \
            --exclude '.env*' \
            -e "ssh -i ~/.ssh/atrium_deploy_key -p ${{ secrets.VPS_PORT }}" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${APP_DIR}/"

      - name: Build and restart on VPS
        run: |
          ssh -i ~/.ssh/atrium_deploy_key -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<EOF
          set -euo pipefail
          cd "${APP_DIR}"
          npm ci
          npm run build
          if pm2 describe "${APP_NAME}" >/dev/null 2>&1; then
            pm2 restart "${APP_NAME}" --update-env
          else
            PORT="${APP_PORT}" pm2 start npm --name "${APP_NAME}" -- start
          fi
          pm2 save
          EOF
